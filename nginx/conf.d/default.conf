upstream app_upstream {
    server app:3000;
}

server {
    listen 80;
    server_name _;

    # Large compliance-report CSVs (can exceed 100MB): no size cap and stream the
    # request body straight through to the app instead of buffering it in nginx.
    location = /api/compliance-reports/upload {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 0;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Excel export: building a workbook for a very large report (tens of thousands
    # of result rows, streamed to disk) can take a while, so give it a generous
    # read timeout and stream the response straight through without buffering.
    location ~ ^/api/compliance-reports/.+/export\.xlsx$ {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Proxy everything to the Node.js app
    location / {
        proxy_pass http://app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check passthrough
    location /healthz {
        proxy_pass http://app_upstream/healthz;
    }
}
